# Alembic 配置（M17）——只留必要项，其余走 Alembic 默认值。
#
# 这里**故意不写 sqlalchemy.url**：DSN 的唯一事实来源是 app/db/session.py 的 _database_url()
# （读 DATABASE_URL，缺省 var/globex.db）。在 ini 里再抄一份，就等于埋一个「改了环境变量却忘了
# 改 ini、迁移跑到另一个库上」的雷。migrations/env.py 直接向 session.py 要。

[alembic]
script_location = migrations
# 版本文件名带日期前缀，按时间排序一目了然（rev id 本身是随机 hex，排不出先后）。
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
