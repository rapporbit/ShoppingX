# 前端静态托管。只做两件事：SPA history fallback + 静态资源缓存。
# /api 与 /ws 不到这里——Caddy 按路径先分流给 backend（见 VPS 上的 Caddyfile）。
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 带 hash 的构建产物可长缓存；index.html 绝不缓存，否则前端发版后用户拿到旧壳子配新资源。
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA：前端路由的深链接（/xxx）刷新时不该 404，交给 index.html 自己解析。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
